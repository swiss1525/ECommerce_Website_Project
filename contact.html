<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<style>

    @font-face {
  font-family: Figtree-Black;
  src: url(../fonts/Figtree/Figtree-Black.ttf);
}
    @font-face {
  font-family: Figtree-Bold;
  src: url(../fonts/Figtree/Figtree-Bold.ttf);
}
    @font-face {
  font-family: Figtree;
  src: url(../fonts/Figtree/Figtree-Regular.ttf);
}

* {
    font-family: Figtree;
}

</style>

<body>
    <div id="NavbarComponent"></div>
    <div class="container mt-4">
        <h1 style="font-family: Figtree-Bold;">Contact Us</h1>
        <p>
            If you have any questions or concerns, please feel free to reach out to us using the contact form below. <br>
            <span style="color: red;">*</span> = Required
        </p>
        <form id="contactForm">
            <div class="mb-3">
                <label for="name" class="form-label">Name: <span style="color: red;"> *</span></label>
                <input type="text" class="form-control" id="name" name="name">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email:<span style="color: red;"> *</span></label>
                <input type="email" class="form-control" id="email" name="email">
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Message: <span style="color: red;"> *</span></label>
                <textarea class="form-control" id="message" name="message" rows="5"></textarea>
            </div>
            <p style="text-align: center; color: red; font-style: italic; font-family: Figtree-Bold; font-size: 20px;" id="error"></p>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        </div>
            <footer class="fixed-bottom bg-dark text-light text-center pb-4 pt-4 footer mt-3">
      <p style="margin: 0;">&copy; 2026 The ULTIMATE Store. All rights reserved.</p>
    </footer>
</body>
<script src="js/contact.js"></script>
<script src="js/global-components.js"></script>
<script src="js/menu-cart.js"></script>
</html>
