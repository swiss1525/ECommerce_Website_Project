<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<style>
    .form-box {
        background-color: rgb(218, 218, 218);
        max-width: 400px;
        padding: 20px;
        border-radius: 10px;
    }
</style>

<body>
    <div id="NavbarComponent"></div>
    <div class="d-flex justify-content-center align-items-center vh-100">

        <div class="form-box container text-center">
            <h2>Register</h2>
            <form id="registrationForm">
                <label for="username">Username:</label><br>
                <input type="text" id="username" name="username" required> <br>

                <label for="email">Email:</label> <br>
                <input type="email" id="email" name="email" required> <br>

                <label for="password">Password:</label> <br>
                <input type="password" id="password" name="password" required> <br>
                <label for="confirmPassword">Confirm Password:</label> <br>
                <input type="password" id="confirmPassword" name="confirmPassword" required> <br> <br>

                <button class="btn btn-primary" type="submit">Register</button> <br> <br>
            </form>
            <p>Already have an account? <a href="login-page.html">Login here</a></p>
        </div>

    </div>

</body>
<script src="js/registration.js"></script>
<script src="js/global-components.js"></script>
<script src="js/menu-cart.js"></script>

</html>
