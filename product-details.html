<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/product-details.css" />
  </head>

  <body>
    <div class="container text-center">
      <div class="row">
        <div class="align-items-center d-flex flex-column">
          <img style="width: 50%; margin: auto" id="productImage" />
          <h2 id="productName"></h2>
          <p id="productDescription"></p>
          <h4 id="productPrice"></h4>
          <input type="number" id="quantityInput" value="0" min="0" step="1" />
          <h4 id="totalPrice">Total:</h4>
          <button class="btn btn-primary">Add to Cart</button>
          <button class="btn btn-secondary" onclick="window.location.href='/cart.html'">View Cart</button>
        </div>
      </div>
    </div>
  </body>
  <script src="js/product-details.js"></script>
</html>
