<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="NavbarComponent"></div>
    <div class="container">
      <h1>Checkout</h1>

      <div class="row">
        <div class="col-md-6">
          <h2>Billing Information</h2>

          <form id="checkoutForm">
            <div>
              <label for="customerName">Name:</label>
              <input type="text" id="customerName" />
            </div>
            <br />

            <div>
              <label for="customerAddress">Address:</label>
              <input type="text" id="customerAddress" />
            </div>
            <br />
            <div>
              <label for="customerPostalCode">Postal Code:</label>
              <input type="text" id="customerPostalCode" />
            </div>

            <br />
            <div>
              <label for="paymentMethod">Payment Method:</label>
              <select id="paymentMethod" onchange="showPaymentFields()">
                <option value="none">Select Payment Method</option>
                <option value="credit">Credit Card</option>
                <option value="debit">Debit Card</option>
                <option value="paypal">PayPal</option>
              </select>
            </div>

            <div id="creditFields" style="display: none">
              <p>Credit Card Information:</p>
              <label for="creditCardholderName">Cardholder Name:</label>
              <input
                type="text"
                id="creditCardholderName"
                placeholder="Cardholder Name"
              />

              <label for="creditCardNumber">Card Number:</label>
              <input
                type="text"
                id="creditCardNumber"
                placeholder="Card Number"
              />
            </div>

            <div id="debitFields" style="display: none">
              <p>Debit Card Information:</p>
              <label for="debitCardholderName">Cardholder Name:</label>
              <input
                type="text"
                id="debitCardholderName"
                placeholder="Cardholder Name"
              />

              <label for="debitCardNumber">Card Number:</label>
              <input
                type="text"
                id="debitCardNumber"
                placeholder="Card Number"
              />
            </div>

            <div id="paypalFields" style="display: none">
              <p>PayPal Information:</p>
              <label for="paypalEmail">PayPal Email:</label>
              <input type="email" id="paypalEmail" placeholder="PayPal Email" />
            </div>

            <button type="submit">Place Order</button>
          </form>

          <p id="confirmationMessage"></p>
        </div>

        <div class="col-md-6">
          <h2>Order Summary</h2>
          <div id="orderSummary"></div>
          <h3 id="orderTotal">Total: $0.00</h3>
        </div>
      </div>
    </div>
  </body>
  <script src="js/checkout.js"></script>
  <script src="js/global-components.js"></script>
  <script src="js/menu-cart.js" defer></script>
</html>
